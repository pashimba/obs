<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - StreamMaker</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-layout {
      padding: 3rem 4rem;
      flex: 1;
      display: flex;
      justify-content: center;
    }
    .profile-card {
      width: 100%;
      max-width: 800px;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 2rem;
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 2rem;
    }
    .profile-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=400&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      border: 4px solid var(--panel-border);
      position: relative;
    }
    .photo-edit-btn {
      position: absolute;
      bottom: 0;
      right: 0;
      background: var(--brand-color);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      border: 2px solid var(--bg-dark);
      transition: all 0.2s;
    }
    .photo-edit-btn:hover {
      transform: scale(1.1);
      background: var(--brand-hover);
    }
    .profile-info h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .profile-info p {
      font-size: 1rem;
      color: var(--text-muted);
    }
    .profile-stats {
      display: flex;
      gap: 2rem;
      margin-top: 1rem;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main);
    }
    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .settings-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    @media (max-width: 768px) {
      .settings-section {
        grid-template-columns: 1fr;
      }
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="dashboard.html" class="brand">
      <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14v-4z"></path><rect x="3" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>
      StreamMaker
    </a>
    <div class="nav-actions">
      <a href="dashboard.html" class="btn btn-secondary" style="text-decoration: none;">
        <svg viewBox="0 0 24 24" style="width: 16px; height: 16px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Dashboard
      </a>
      <a href="profile.html" class="user-avatar" title="Mi Perfil" style="text-decoration: none; color: white;">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=40&auto=format&fit=crop" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;" alt="U">
      </a>
    </div>
  </nav>

  <div class="profile-layout">
    <div class="glass-panel profile-card">
      
      <div class="profile-header">
        <div class="profile-photo" id="profilePhotoContainer">
          <input type="file" id="photoInput" accept="image/*" style="display: none;">
          <div class="photo-edit-btn" id="changePhotoBtn" title="Cambiar foto">
            <svg viewBox="0 0 24 24" style="width:16px; height:16px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          </div>
        </div>
        <div class="profile-info">
          <h1 id="profileNameDisplay">Uriel (Usuario)</h1>
          <p id="profileBioDisplay">Streamer de fin de semana • Creador de contenido</p>
          <div class="profile-stats">
            <div class="stat-item">
              <span class="stat-value">1.2K</span>
              <span class="stat-label">Seguidores</span>
            </div>
            <div class="stat-item">
              <span class="stat-value">4</span>
              <span class="stat-label">Proyectos Activos</span>
            </div>
            <div class="stat-item">
              <span class="stat-value">120h</span>
              <span class="stat-label">Horas Transmitidas</span>
            </div>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <div>
          <h3 style="margin-bottom: 1.5rem; color: var(--brand-color);">Información Personal</h3>
          <div class="input-group">
            <label>Nombre de Usuario</label>
            <input type="text" id="usernameInput" class="input-control" value="GamerUriel">
          </div>
          <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" class="input-control" value="uriel@ejemplo.com">
          </div>
          <div class="input-group">
            <label>Biografía</label>
            <textarea id="bioInput" class="input-control" rows="3" style="resize: none;">Apasionado por los videojuegos y el streaming. ¡Acompáñame en mis aventuras!</textarea>
          </div>
        </div>

        <div>
          <h3 style="margin-bottom: 1.5rem; color: var(--brand-color);">Cuentas Vinculadas</h3>
          
          <div class="social-login" style="margin-bottom: 1rem;">
            <div class="btn-social" style="justify-content: space-between; padding-right: 1.5rem;">
              <div style="display:flex; align-items:center; gap:0.8rem;">
                <svg style="color:#9146FF; width:24px; height:24px;" viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>
                <span id="twitchStatusText" style="font-weight: 500;">Twitch (Conectado)</span>
              </div>
              <button id="twitchActionBtn" class="btn btn-secondary" style="padding: 0.3rem 0.8rem; font-size: 0.8rem;">Desvincular</button>
            </div>

            <div id="youtubeContainer" class="btn-social" style="justify-content: space-between; padding-right: 1.5rem; background: rgba(0,0,0,0.2);">
              <div id="youtubeTextContainer" style="display:flex; align-items:center; gap:0.8rem; color: var(--text-muted);">
                <svg style="width:24px; height:24px;" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                <span id="youtubeStatusText" style="font-weight: 500;">YouTube</span>
              </div>
              <button id="youtubeActionBtn" class="btn btn-primary" style="padding: 0.3rem 0.8rem; font-size: 0.8rem;">Vincular</button>
            </div>
          </div>

          <div style="margin-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem;">
            <a href="login.html" class="btn btn-danger" style="text-decoration: none;">Cerrar Sesión</a>
            <button id="saveBtn" class="btn btn-primary">Guardar Cambios</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Referencias al DOM
    const changePhotoBtn = document.getElementById('changePhotoBtn');
    const photoInput = document.getElementById('photoInput');
    const profilePhotoContainer = document.getElementById('profilePhotoContainer');
    
    const saveBtn = document.getElementById('saveBtn');
    const usernameInput = document.getElementById('usernameInput');
    const bioInput = document.getElementById('bioInput');
    const profileNameDisplay = document.getElementById('profileNameDisplay');
    const profileBioDisplay = document.getElementById('profileBioDisplay');
    
    // Botones sociales
    const twitchActionBtn = document.getElementById('twitchActionBtn');
    const twitchStatusText = document.getElementById('twitchStatusText');
    const youtubeActionBtn = document.getElementById('youtubeActionBtn');
    const youtubeStatusText = document.getElementById('youtubeStatusText');
    const youtubeContainer = document.getElementById('youtubeContainer');
    const youtubeTextContainer = document.getElementById('youtubeTextContainer');

    // Funcionalidad: Cambiar foto (simulada)
    changePhotoBtn.addEventListener('click', () => {
      photoInput.click();
    });

    photoInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        // En un caso real se subiría al servidor, aquí creamos un ObjectURL local para la vista previa
        const imageUrl = URL.createObjectURL(file);
        profilePhotoContainer.style.backgroundImage = `url('${imageUrl}')`;
      }
    });

    // Funcionalidad: Guardar Cambios
    saveBtn.addEventListener('click', () => {
      // Tomamos los valores
      const newName = usernameInput.value.trim();
      const newBio = bioInput.value.trim();
      
      if (newName) {
        profileNameDisplay.textContent = `${newName} (Usuario)`;
      }
      if (newBio) {
        profileBioDisplay.textContent = newBio;
      }
      
      // Feedback visual del botón
      const originalText = saveBtn.textContent;
      saveBtn.textContent = '¡Guardado!';
      saveBtn.style.background = 'var(--success-color)';
      saveBtn.style.boxShadow = '0 0 15px rgba(16, 185, 129, 0.4)';
      
      setTimeout(() => {
        saveBtn.textContent = originalText;
        saveBtn.style.background = '';
        saveBtn.style.boxShadow = '';
      }, 2000);
    });

    // Funcionalidad: Vincular/Desvincular Twitch
    let isTwitchLinked = true;
    twitchActionBtn.addEventListener('click', () => {
      isTwitchLinked = !isTwitchLinked;
      if (isTwitchLinked) {
        twitchActionBtn.textContent = 'Desvincular';
        twitchActionBtn.className = 'btn btn-secondary';
        twitchStatusText.textContent = 'Twitch (Conectado)';
      } else {
        twitchActionBtn.textContent = 'Vincular';
        twitchActionBtn.className = 'btn btn-primary';
        twitchStatusText.textContent = 'Twitch';
      }
    });

    // Funcionalidad: Vincular/Desvincular YouTube
    let isYoutubeLinked = false;
    youtubeActionBtn.addEventListener('click', () => {
      isYoutubeLinked = !isYoutubeLinked;
      if (isYoutubeLinked) {
        youtubeActionBtn.textContent = 'Desvincular';
        youtubeActionBtn.className = 'btn btn-secondary';
        youtubeStatusText.textContent = 'YouTube (Conectado)';
        youtubeContainer.style.background = 'transparent';
        youtubeTextContainer.style.color = 'var(--text-main)';
      } else {
        youtubeActionBtn.textContent = 'Vincular';
        youtubeActionBtn.className = 'btn btn-primary';
        youtubeStatusText.textContent = 'YouTube';
        youtubeContainer.style.background = 'rgba(0,0,0,0.2)';
        youtubeTextContainer.style.color = 'var(--text-muted)';
      }
    });
  </script>
</body>
</html>
